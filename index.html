function toolUI(id){
const common=(body,fn='')=>`${body}<div class="actions"><button class="btn" onclick="${fn}">Run</button><button class="btn secondary" onclick="resetTool()">Reset</button></div><div id="result" class="result" style="display:none"></div>`;
switch(id){
case'percentage':return common(`<div class="form-grid">${field('Marks obtained','<input id="a" type="number" min="0">')}${field('Total marks','<input id="b" type="number" min="0">')}</div>`,'calcPercentage()');
case'average':return common(field('Numbers (comma separated)','<input id="a" placeholder="10, 20, 30">'),'calcAverage()');
case'cgpa':return common(field('CGPA','<input id="a" type="number" step="0.01" min="0" max="10">')+'<p class="muted">Approximation used: Percentage ≈ CGPA × 9.5. Your institution may use a different formula.</p>','calcCGPA()');
case'increase':return common(`<div class="form-grid">${field('Original value','<input id="a" type="number">')}${field('New value','<input id="b" type="number">')}</div>`,'calcIncrease()');
case'calculator':return `<div class="form-grid">${field('First number','<input id="a" type="number" step="any">')}${field('Operation','<select id="op"><option>+</option><option>-</option><option>*</option><option>/</option></select>')}${field('Second number','<input id="b" type="number" step="any">')}</div>${common('','calcBasic()')}`;
case'age':return common(field('Date of birth','<input id="a" type="date">'),'calcAge()');
case'date-diff':return common(`<div class="form-grid">${field('Start date','<input id="a" type="date">')}${field('End date','<input id="b" type="date">')}</div>`,'calcDateDiff()');
case'notes':return notesUI();case'todo':return todoUI();case'study-timer':return timerUI('Study Timer',25*60);case'word-counter':return `<textarea id="a" placeholder="Type or paste your text here..." style="width:100%;min-height:220px"></textarea><div id="wc" class="result">Words: 0 · Characters: 0 · Without spaces: 0 · Sentences: 0 · Paragraphs: 0</div><div class="actions"><button class="btn secondary" onclick="resetTool()">Clear</button></div><script>setTimeout(()=>{let x=document.getElementById('a');x.oninput=()=>wordCount(x.value)},0)<\/script>`;
case'prompt-gen':return common(`<div class="form-grid">${field('Category','<select id="a"><option>Study</option><option>Writing</option><option>Programming</option><option>Business</option><option>Content Creation</option></select>')}${field('Goal','<input id="b" placeholder="e.g. learn JavaScript loops">')}</div>`,'promptGen()');
case'prompt-improver':return common(field('Your prompt','<textarea id="a" placeholder="Write your rough prompt..."></textarea>',true),'promptImprove()');
case'writing-helper':return common(`<div class="form-grid">${field('Task','<select id="op"><option>Rewrite</option><option>Summarize</option><option>Expand</option><option>Make simpler</option><option>Make professional</option></select>')}</div>${field('Text','<textarea id="a"></textarea>',true)}`,'writingHelp()');
case'study-prompt':return common(`<div class="form-grid">${field('Subject','<input id="a">')}${field('Topic','<input id="b">')}${field('Difficulty','<select id="op"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>')}</div>`,'studyPrompt()');
case'idea-gen':return common(field('Topic','<input id="a" placeholder="e.g. cyber security for beginners">'),'ideaGen()');
case'ai-directory':return `<input id="dirSearch" oninput="filterDirectory(this.value)" placeholder="Search AI categories..." style="width:100%;padding:11px;background:#0b111c;border:1px solid var(--border);color:var(--text);border-radius:10px"><div id="directory" class="grid" style="margin-top:15px">${['Writing & Research','Coding Assistants','Design & Image','Video & Audio','Education & Study','Productivity & Automation'].map(x=>`<div class="card" data-dir="${x.toLowerCase()}"><h3>${x}</h3><p class="muted">Explore tools in this category through official websites and trusted services. This directory does not claim API access.</p></div>`).join('')}</div>`;
case'password-check':return `<div class="field">${field('Password','<input id="a" type="password" autocomplete="new-password" oninput="passwordCheck(this.value)">')}</div><div id="result" class="result">Type a password to check characteristics. It is not stored.</div>`;
case'password-gen':return common(`<div class="form-grid">${field('Length','<input id="a" type="number" min="4" max="128" value="16">')}${field('Options','<div class="checklist"><label><input id="up" type="checkbox" checked> Uppercase</label><label><input id="low" type="checkbox" checked> Lowercase</label><label><input id="num" type="checkbox" checked> Numbers</label><label><input id="sym" type="checkbox" checked> Symbols</label></div>')}</div>`,'passwordGen()');
case'username':return common(field('Username','<input id="a" placeholder="your_username">')+'<p class="muted">Real availability can only be checked on each individual platform. This tool does not make fake availability claims.</p>','usernameCheck()');
case'phishing':return common(field('Suspicious message or URL','<textarea id="a"></textarea>',true),'phishingCheck()');
case'url-safety':return common(field('URL','<input id="a" placeholder="https://example.com">'),'urlSafety()');
case'cyber-check':return checklist('cyberChecklist',['Use unique passwords','Enable two-factor authentication','Update phone and apps','Review account recovery options','Avoid unknown attachments and links']);
case'privacy-check':return checklist('privacyChecklist',['Review account privacy settings','Use screen lock','Check app permissions','Limit public personal information','Review social media audience settings']);
case'safety-guide':return `<div class="guide"><article><h3>Use unique passwords</h3><p>Never reuse an important password across multiple services.</p></article><article><h3>Use a password manager</h3><p>A reputable password manager can help create and store unique passwords securely.</p></article><article><h3>Turn on MFA</h3><p>Multi-factor authentication adds another layer of protection.</p></article><article><h3>Never share passwords</h3><p>Easy Digital Buddy never asks you to enter or send a real password for storage.</p></article></div>`;
case'earning-roadmap':return `<div class="guide">${[['Freelancing','Choose one skill → build samples → create a profile → apply consistently.'],['Website Building','Learn HTML/CSS/JS → build projects → offer websites to local businesses.'],['Blogging','Choose a useful niche → publish consistently → learn SEO → monetize later.'],['Affiliate Marketing','Build an audience → recommend relevant products honestly → disclose affiliate links.'],['Digital Products','Create templates, guides or assets → validate demand → sell through a suitable platform.'],['YouTube/Content','Choose a topic → create useful content → improve thumbnails, titles and consistency.'],['Tutoring','Choose a subject → define your level → find students through trusted channels.'],['Remote Work','Build job-ready skills → portfolio/CV → apply to verified opportunities.'],['Microtasks','Use trusted platforms and understand payment rules; income is usually variable.']].map(x=>`<article><h3>${x[0]}</h3><p>${x[1]}</p></article>`).join('')}</div>`;
case'income-calc':return common(`<div class="form-grid">${field('Estimated hourly rate','<input id="a" type="number" min="0">')}${field('Hours per week','<input id="b" type="number" min="0">')}</div><p class="muted">Estimate only. Actual income varies by skill, demand, platform fees, taxes and consistency.</p>`,'incomeCalc()');
case'time-calc':return common(`<div class="form-grid">${field('Hours per day','<input id="a" type="number" min="0">')}${field('Days per week','<input id="b" type="number" min="0" max="7">')}</div>`,'timeCalc()');
case'skill-tracker':return `<div class="form-grid">${field('Skill name','<input id="a" placeholder="JavaScript">')}${field('Progress %','<input id="b" type="number" min="0" max="100" value="0">')}</div>${common('','saveSkill()')}<div id="skills" style="margin-top:15px"></div><script>setTimeout(renderSkills,0)<\/script>`;
case'data-calc':return common(`<div class="form-grid">${field('Daily video hours','<input id="a" type="number" min="0">')}${field('Video data per hour (GB)','<input id="b" type="number" step="any" value="1">')}${field('Daily other data (GB)','<input id="c" type="number" step="any" value="0.2">')}</div>`,'dataCalc()');
case'download-time':return common(`<div class="form-grid">${field('File size (GB)','<input id="a" type="number" step="any">')}${field('Speed (Mbps)','<input id="b" type="number" step="any">')}</div>`,'downloadTime()');
case'data-converter':return common(`<div class="form-grid">${field('Value','<input id="a" type="number" step="any">')}${field('From','<select id="op"><option>Bytes</option><option>KB</option><option>MB</option><option>GB</option><option>TB</option></select>')}${field('To','<select id="b"><option>Bytes</option><option>KB</option><option>MB</option><option>GB</option><option>TB</option></select>')}</div>`,'dataConvert()');
case'speed-converter':return common(`<div class="form-grid">${field('Value','<input id="a" type="number" step="any">')}${field('From','<select id="op"><option>Mbps</option><option>MB/s</option><option>Gbps</option></select>')}${field('To','<select id="b"><option>Mbps</option><option>MB/s</option><option>Gbps</option></select>')}</div>`,'speedConvert()');
case'qr-gen':return common(`<div class="form-grid">${field('Type','<select id="op"><option>Text</option><option>URL</option><option>Email</option><option>Phone</option></select>')}</div>${field('Content','<textarea id="a"></textarea>',true)}<p class="muted">This single-file version creates a clean QR-style SVG fallback without an external QR library. For production-grade QR decoding/encoding, a dedicated library can be added.</p>`,'qrGenerate()');
case'qr-reader':return `<p>Camera access requires browser permission and HTTPS/localhost in most browsers. This single-file offline fallback lets you select an image, but decoding QR pixels requires a QR decoding library.</p><input type="file" accept="image/*" capture="environment" onchange="qrReaderInfo(this)"><div id="result" class="result">No image selected.</div>`;
case'url-shortener':return `<div class="result">A real short URL must be created by a backend or shortening API. This tool intentionally does not fake short links. You can enter a URL below to validate it.</div>${common(field('URL','<input id="a" placeholder="https://example.com">'),'validateUrlOnly()')}`;
case'color-picker':return `<input id="a" type="color" value="#63e6be" style="width:100%;height:70px" oninput="colorValues(this.value)"><div id="result" class="result">Choose a color.</div><script>setTimeout(()=>colorValues('#63e6be'),0)<\/script>`;
case'random-number':return common(`<div class="form-grid">${field('Minimum','<input id="a" type="number" value="1">')}${field('Maximum','<input id="b" type="number" value="100">')}</div>`,'randomNumber()');
case'random-choice':return common(field('Options (one per line)','<textarea id="a"></textarea>',true),'randomChoice()');
case'case':return textTool('Text','caseConvert()');
case'cleaner':return textTool('Text','cleanText()');
case'repeater':return common(`<div class="form-grid">${field('Text','<input id="a">')}${field('Repeat count','<input id="b" type="number" min="1" max="10000" value="3">')}</div>`,'repeatText()');
case'sorter':return common(`<textarea id="a" placeholder="One item per line"></textarea><div class="checklist"><label><input id="dup" type="checkbox" checked> Remove duplicates</label></div>`,'sortText()');
case'json':return textTool('JSON','formatJSON()');
case'base64':return `<div class="form-grid">${field('Mode','<select id="op"><option>Encode</option><option>Decode</option></select>')}</div>${field('Text','<textarea id="a"></textarea>',true)}${common('','base64Run()')}`;
case'url-code':return `<div class="form-grid">${field('Mode','<select id="op"><option>Encode</option><option>Decode</option></select>')}</div>${field('Text','<textarea id="a"></textarea>',true)}${common('','urlCodeRun()')}`;
case'html-entity':return `<div class="form-grid">${field('Mode','<select id="op"><option>Encode</option><option>Decode</option></select>')}</div>${field('Text','<textarea id="a"></textarea>',true)}${common('','entityRun()')}`;
case'markdown':return `<div class="form-grid"><div class="field"><label>Markdown</label><textarea id="a" oninput="markdownPreview(this.value)"># Hello\n\n**Bold** and *italic*</textarea></div><div class="field"><label>Preview</label><div id="preview" class="result"></div></div></div><script>setTimeout(()=>markdownPreview($('#a').value),0)<\/script>`;
case'image-compress':return imageTool('compress');
case'image-resize':return imageTool('resize');
case'image-format':return imageTool('format');
case'color-converter':return common(field('HEX color','<input id="a" placeholder="#63e6be">'),'colorConvert()');
case'gradient':return `<div class="form-grid">${field('Color 1','<input id="a" type="color" value="#63e6be">')}${field('Color 2','<input id="b" type="color" value="#7c9cff">')}${field('Direction','<select id="op"><option>to right</option><option>to left</option><option>to bottom</option><option>to top</option><option>135deg</option></select>')}</div><div id="preview" style="height:140px;border-radius:14px;margin-top:15px"></div><div id="result" class="result"></div><div class="actions"><button class="btn" onclick="gradientRun()">Generate</button><button class="btn secondary" onclick="copyText($('#result').textContent)">Copy CSS</button></div><script>setTimeout(gradientRun,0)<\/script>`;
case'shadow':return `<div class="form-grid">${field('X (px)','<input id="a" type="number" value="8">')}${field('Y (px)','<input id="b" type="number" value="8">')}${field('Blur (px)','<input id="c" type="number" value="20">')}${field('Spread (px)','<input id="d" type="number" value="0">')}</div><div id="preview" style="height:120px;background:#172033;border-radius:12px;margin:25px"></div><div id="result" class="result"></div><div class="actions"><button class="btn" onclick="shadowRun()">Generate</button><button class="btn secondary" onclick="copyText($('#result').textContent)">Copy CSS</button></div><script>setTimeout(shadowRun,0)<\/script>`;
case'radius':return `<div class="form-grid">${['Top-left','Top-right','Bottom-right','Bottom-left'].map((x,i)=>field(x,`<input id="r${i}" type="range" min="0" max="100" value="20" oninput="radiusRun()">`)).join('')}</div><div id="preview" style="height:150px;background:#63e6be;margin:25px"></div><div id="result" class="result"></div><script>setTimeout(radiusRun,0)<\/script>`;
case'lorem':return common(`<div class="form-grid">${field('Paragraphs','<input id="a" type="number" min="1" max="20" value="2">')}${field('Approx. words per paragraph','<input id="b" type="number" min="5" max="500" value="50">')}</div>`,'loremRun()');
case'timestamp':return common(`<div class="form-grid">${field('Mode','<select id="op"><option>Unix → Date</option><option>Date → Unix</option></select>')}${field('Value','<input id="a" placeholder="e.g. 1720000000 or 2026-07-19T12:00">')}</div>`,'timestampRun()');
case'units':return common(`<div class="form-grid">${field('Category','<select id="op"><option>Length</option><option>Weight</option><option>Temperature</option><option>Area</option><option>Volume</option></select>')}${field('Value','<input id="a" type="number" step="any">')}${field('From','<input id="b" placeholder="km">')}${field('To','<input id="c" placeholder="m">')}</div><p class="muted">Supported examples: length m, km, cm, mi, ft; weight kg, g, lb; temperature C, F; area m2, km2, ft2; volume L, mL, gal.</p>`,'unitRun()');
case'currency':return common(`<div class="form-grid">${field('Amount','<input id="a" type="number" step="any">')}${field('Manual rate (target units per 1 source unit)','<input id="b" type="number" step="any" placeholder="Enter your current rate">')}</div><p class="muted">Live exchange rates require a current API. This tool intentionally uses manual conversion only and does not display fake live rates.</p>`,'currencyRun()');

function openProduct(id){
  const p=PRODUCTS[id]; if(!p)return;
  const file=PRODUCT_FILES[id];
  $('#productDetails').innerHTML=`<div class="real-preview"><iframe src="${file}" title="${p.title} preview"></iframe></div><h2>${p.title}</h2><p class="muted">${p.type}</p><ul>${p.items.map(x=>`<li>${x}</li>`).join('')}</ul><div class="product-buy"><strong>${p.price}</strong><a class="btn" href="${file}" download>Download Template</a><button class="btn" onclick="openWhatsApp('product','${p.title}')">Order on WhatsApp</button></div><p class="tiny muted">The template file is included for preview/testing. For a paid customer order, confirm payment first and then deliver the purchased file.</p>`;
  $('#productModal').classList.add('show');
}
function closeProduct(){$('#productModal').classList.remove('show')}

const BUSINESS_WHATSAPP='918570865336';
function openWhatsApp(type='general', product=''){
  const messages={
    general:'Hi! I want to know more about Easy Digital Buddy products and services.',
    product:`Hi! I want to order this digital product: ${product}`,
    custom:'Hi! I want to request a custom digital design/service from Easy Digital Buddy.',
    website:'Hi! I am interested in getting a website/digital service made.'
  };
  window.open(`https://wa.me/${BUSINESS_WHATSAPP}?text=${encodeURIComponent(messages[type]||messages.general)}`,'_blank','noopener,noreferrer');
}
function addWhatsAppButtons(){
  document.querySelectorAll('[data-wa]').forEach(b=>{
    b.onclick=()=>openWhatsApp(b.dataset.wa,b.dataset.product||'');
  });
}

const langState={hi:false};
function toggleLang(){langState.hi=!langState.hi;$('#langBtn').textContent=langState.hi?'EN':'हिं';$('#buddyGreeting').textContent=langState.hi?'नमस्ते! मैं ED Buddy हूँ 👋':'Hi! I’m ED Buddy 👋';$('#buddyRotating').textContent=langState.hi?'Tool खोजो। Skill सीखो। Online safe रहो।':'Find a tool. Learn a skill. Stay safe online.'}
const paths={
 study:{title:'📚 Study Path',steps:[['Percentage Calculator','tool/percentage'],['Study Timer','tool/study-timer'],['Notes','tool/notes'],['To-Do List','tool/todo']]},
 earning:{title:'💰 Online Earning Path',steps:[['Choose a skill','earning'],['Build a practice project','tool/text-cleaner'],['Track your progress','dashboard'],['Learn scam safety','safety']]},

function openWizard(key){let p=paths[key];let e=$('#wizardBox');if(!e)return;e.innerHTML=`<h3>${p.title}</h3><p class="muted">Follow these steps:</p>`+p.steps.map((s,i)=>`<div class="wizard-step" onclick="wizardGo('${s[1]}')"><b>${i+1}</b><span>${s[0]}</span><span style="margin-left:auto">→</span></div>`).join('')}
function wizardGo(path){if(path==='dashboard'){renderDashboard();return}if(path==='earning'||path==='safety'){alert('This learning path is available as an educational roadmap. Explore the Online Earning or Online Safety category.');return}go(path)}
function openWorkflow(key){let data={freelance:['💼 Start Freelancing',['Choose a skill','Practice with a small project','Create a portfolio','Learn safe earning basics']],content:['📸 Create Digital Content',['Generate an idea','Clean or write text','Resize/compress an image','Create a QR code']],safety:['🛡️ Secure Your Account',['Check password strength','Generate a unique password','Review privacy settings','Learn phishing warning signs']]}[key];$('#wizardBox').innerHTML=`<h3>${data[0]}</h3>`+data[1].map((x,i)=>`<div class="wizard-step"><b>${i+1}</b><span>${x}</span><span style="margin-left:auto">✓</span></div>`).join('');window.scrollTo({top:document.querySelector('#wizardBox').offsetTop-80,behavior:'smooth'})}
function renderDashboard(){let e=$('#dashboardBox');if(!e)return;let notes=JSON.parse(localStorage.getItem('edb-notes')||'[]').length,todos=JSON.parse(localStorage.getItem('edb-todos')||'[]'),done=todos.filter(x=>x.done).length,recent=recentIds().length;e.innerHTML=`<div class="dashboard-item"><b>${recent}</b><span>Recent tools</span></div><div class="dashboard-item"><b>${notes}</b><span>Saved notes</span></div><div class="dashboard-item"><b>${todos.length}</b><span>Total tasks</span></div><div class="dashboard-item"><b>${done}</b><span>Completed tasks</span></div>`}
function initDynamic(){renderDashboard();addWhatsAppButtons();let phrases=['Find a tool. Learn a skill. Stay safe online.','Calculate anything. Create anything.','Your digital journey starts here.','Learn • Create • Protect • Grow'];let i=0;setInterval(()=>{let e=$('#buddyRotating');if(e){i=(i+1)%phrases.length;e.style.opacity='0';setTimeout(()=>{e.textContent=phrases[i];e.style.opacity='1'},250)}},3000)}
function searchTools(q){let box=$('#searchResults');if(!box)return;let s=q.trim().toLowerCase();if(!s){box.innerHTML='';return}let found=tools.filter(t=>(t.name+' '+t.desc+' '+catById(t.cat).name).toLowerCase().includes(s));box.innerHTML=`<div class="section-title"><h2>Search Results</h2></div>${found.length?'<div class="grid">'+found.map(toolCard).join('')+'</div>':'<div class="noresults">No results found. Try another tool name, category or keyword.</div>'}`}
function go(path){if(path.startsWith('tool/'))addRecent(path.split('/')[1]);if(path==='home'){history.pushState({},'', '#home');app.innerHTML=home();applyTheme();setTimeout(initDynamic,50);window.scrollTo(0,0);return}let [type,id]=path.split('/');history.pushState({},'', '#'+path);app.innerHTML=type==='category'?category(id):toolPage(id);window.scrollTo(0,0)}
window.onpopstate=()=>{let p=location.hash.slice(1)||'home';go(p)};
app.innerHTML=home();applyTheme();setTimeout(initDynamic,50);
</script>

<script>
/* ===== EASY DIGITAL BUDDY: UNIQUE INTERACTION SYSTEM ===== */
(function(){
  const toast=(msg)=>{const el=document.getElementById('edbToast');if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(window._edbToast);window._edbToast=setTimeout(()=>el.classList.remove('show'),2400)};
  window.edbToast=toast;
  window.openCommand=()=>{document.getElementById('edbCommand').classList.add('show');const i=document.getElementById('edbCommandInput');i.value='';renderCommandResults('');setTimeout(()=>i.focus(),50)};
  window.closeCommand=()=>document.getElementById('edbCommand').classList.remove('show');
  window.renderCommandResults=(q='')=>{
    const box=document.getElementById('edbCommandResults'); if(!box)return;
    const items=(window.ALL_TOOLS_REGISTRY||[]).filter(x=>(x.name+' '+x.category+' '+(x.description||'')).toLowerCase().includes(q.toLowerCase())).slice(0,12);
    box.innerHTML=items.length?items.map(x=>`<div class="edb-command-item" onclick="closeCommand();go('${x.category||'home'}')"><span>⚡</span><div><b>${x.name}</b><small>${x.category||'Tool'}</small></div></div>`).join(''):'<div class="edb-command-item">🔎 No matching tool found</div>';
  };
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommand()}
    if(e.key==='Escape')closeCommand();
  });
  window.addEventListener('scroll',()=>{
    const h=document.documentElement;
    const p=(window.scrollY/(h.scrollHeight-h.clientHeight))*100;
    const bar=document.getElementById('edbProgress'); if(bar)bar.style.width=Math.max(0,Math.min(100,p))+'%';
  });
  const observer=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.08});
  window.edbObserve=()=>document.querySelectorAll('.edb-reveal').forEach(x=>observer.observe(x));
  window.edbAddSmartEffects=()=>{
    document.querySelectorAll('.product-card,.service-card,.tool-card,.category-card').forEach(x=>x.classList.add('edb-reveal'));
    edbObserve();
  };
  window.addEventListener('load',()=>{setTimeout(edbAddSmartEffects,300)});
})();
</script>
